services:
  db:
    image: mariadb:12.3.2-noble
    container_name: db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  php:
    build: ./docker/php
    container_name: php
    restart: unless-stopped
    environment:
      - XDEBUG_CONFIG=client_host=127.0.0.1
    volumes:
      - ./api:/var/www/html
    depends_on:
      - database

  nginx:
    image: nginx:1.30.3-alpine3.23
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  node:
    image: node:24.18-alpine3.24
    container_name: node
    restart: unless-stopped
    user: "node"
    working_dir: /app
    volumes:
      - ./front:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  db_data:

